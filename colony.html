<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Mars OS - Colony Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* --- ОСНОВНІ НАЛАШТУВАННЯ --- */
:root {
    --accent: #ff5722;
    --glow: rgba(255, 87, 34, 0.4);
    --bg-dark: #0a0400;
    --card-bg: #111827; /* Темно-синій відтінок як на 2-му фото */
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    color: white;
    font-family: 'Rajdhani', sans-serif; /* Більш читабельний для тексту */
    height: 100vh;
    overflow: hidden;
}

/* --- ФОН --- */
#mars-bg {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, var(--bg-dark) 0%, #000 100%);
    z-index: -1;
}

/* --- ГОЛОВНИЙ МАКЕТ --- */
.main-layout {
    display: flex;
    height: 100vh;
    padding: 20px;
    gap: 20px;
}

nav {
    width: 280px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.nav-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 87, 34, 0.3);
    color: #fff;
    padding: 15px;
    font-family: 'Orbitron';
    text-align: left;
    cursor: pointer;
    transition: 0.3s;
    text-transform: uppercase;
    font-size: 0.75rem;
}

.nav-btn.active, .nav-btn:hover {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 15px var(--glow);
}

/* --- ТЕРМІНАЛ ТА КОНТЕНТ --- */
.terminal {
    flex-grow: 1;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid var(--accent);
    padding: 30px;
    overflow-y: auto;
    position: relative;
}

.terminal-title {
    font-family: 'Orbitron';
    color: var(--accent);
    margin-bottom: 30px;
    font-size: 1.5rem;
    text-transform: uppercase;
}

/* --- КАРТКИ КОМАНДИ (СТИЛЬ ЯК НА 2-МУ ФОТО) --- */
.team-wrapper {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

.team-item {
    background: var(--card-bg);
    border-radius: 12px; /* Закруглення як на 2-му фото */
    overflow: hidden;
    transition: transform 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
}

.team-item:hover {
    transform: translateY(-5px);
    border-color: var(--accent);
}

/* Виправлення фото: робимо його на всю ширину зверху */
.team-item img {
    width: 100%;
    height: 250px; /* Фіксована висота як на прикладі */
    object-fit: cover; /* Фото не розтягується, а обрізається по центру */
    display: block;
}

/* Контент всередині картки */
.team-content {
    padding: 20px;
}

.team-item h3 {
    font-family: 'Orbitron';
    color: #f87171; /* Червонуватий відтінок імені */
    font-size: 1.4rem;
    margin-bottom: 8px;
}

.team-item .role {
    color: #fbbf24; /* Золотистий колір посади */
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 1px;
    margin-bottom: 15px;
    display: block;
}

.team-item p {
    color: #9ca3af; /* Сірий колір опису */
    font-size: 0.9rem;
    line-height: 1.5;
}

/* --- ТЕХНІЧНИЙ МОНІТОРИНГ --- */
.section-stats {
    margin-top: 40px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

.stat-block {
    background: rgba(255, 255, 255, 0.03);
    padding: 15px;
    border-left: 3px solid var(--accent);
    font-family: 'Share Tech Mono';
}

/* Скролбар */
.terminal::-webkit-scrollbar { width: 5px; }
.terminal::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>

        function syncSettings() {
            const theme = localStorage.getItem('marsTheme') || '#ff5722';
            const volume = (localStorage.getItem('marsVol') || 70) / 100;
            document.documentElement.style.setProperty('--accent', theme);
            
            const bgMap = {
                "#ff5722":"#1a0800", "#00d4ff":"#000a1a", 
                "#4caf50":"#051a05", "#e91e63":"#1a0008"
            };
            document.documentElement.style.setProperty('--bg-dark', bgMap[theme] || "#1a0800");

            const sfx = document.getElementById('click-sfx');
            sfx.volume = volume;
        }

        function updateDisplay(key, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const sfx = document.getElementById('click-sfx');
            sfx.currentTime = 0;
            sfx.play().catch(()=>{});

            const box = document.getElementById('display-box');
            box.style.opacity = '0';
            
            setTimeout(() => {
                box.innerHTML = content[key];
                box.style.opacity = '1';
                box.scrollTop = 0; // Завжди повертаємо скрол вгору при зміні вкладки
            }, 150);
        }

        setInterval(() => {
            document.getElementById('live-time').innerText = new Date().toLocaleTimeString();
        }, 1000);

        window.onload = () => {
            syncSettings();
            updateDisplay('main', document.querySelector('.nav-btn'));
        };
