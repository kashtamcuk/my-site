<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mars OS - System Config</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #ff5722;
            --bg-color-1: #1a0800;
            --glow: rgba(255, 87, 34, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background: #000;
            color: white;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Анімований фон з сіткою */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(26, 8, 0, 0.8), rgba(0,0,0,0.9)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            background-color: var(--bg-color-1);
            z-index: -1;
            transition: 0.8s;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 100;
        }

        .settings-window {
            width: 700px;
            background: rgba(10, 5, 0, 0.95);
            border: 1px solid var(--accent-color);
            padding: 50px;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1), inset 0 0 20px var(--glow);
            backdrop-filter: blur(15px);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
        }

        h1 {
            font-family: 'Orbitron';
            color: var(--accent-color);
            text-align: left;
            letter-spacing: 5px;
            margin-bottom: 40px;
            font-size: 1.5rem;
            border-left: 5px solid var(--accent-color);
            padding-left: 20px;
            text-transform: uppercase;
        }

        .setting-group {
            display: grid;
            grid-template-columns: 1fr 200px;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 4px;
            transition: 0.3s;
        }

        .setting-group:hover {
            background: rgba(255,87,34,0.05);
            transform: translateX(10px);
        }

        .label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            letter-spacing: 1px;
            color: #aaa;
        }

        /* Стилізація Select */
        select {
            background: #000;
            border: 1px solid var(--accent-color);
            color: white;
            padding: 10px;
            font-family: 'Share Tech Mono';
            outline: none;
            width: 100%;
            text-transform: uppercase;
        }

        /* Кастомний Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #222;
            outline: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent-color);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* Кастомний Checkbox */
        input[type="checkbox"] {
            appearance: none;
            width: 50px;
            height: 25px;
            background: #222;
            border: 1px solid #444;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="checkbox"]:checked {
            background: var(--accent-color);
        }

        input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 15px; height: 15px;
            background: white;
            top: 4px; left: 4px;
            transition: 0.3s;
        }

        input[type="checkbox"]:checked::before {
            left: 29px;
            background: black;
        }

        .button-zone {
            margin-top: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        button {
            padding: 15px;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-family: 'Orbitron';
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        button:hover {
            background: var(--accent-color);
            color: black;
            box-shadow: 0 0 30px var(--accent-color);
        }

        .btn-save {
            background: rgba(255, 87, 34, 0.1);
            font-weight: bold;
        }

        #log {
            font-family: 'Share Tech Mono';
            font-size: 0.7rem;
            color: var(--accent-color);
            margin-top: 20px;
            text-align: left;
            opacity: 0.6;
        }

        /* Декор */
        .decoration {
            position: absolute;
            bottom: 10px; right: 20px;
            font-family: 'Share Tech Mono';
            font-size: 10px;
            color: var(--accent-color);
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="bg-grid" id="bg"></div>
    <div class="scanlines" id="fx"></div>

    <div class="settings-window">
        <h1>System_Configuration //</h1>

        <div class="setting-group">
            <span class="label">VIDEO_SIGNAL_POST_FX</span>
            <input type="checkbox" id="checkFX" onchange="toggleFX()">
        </div>

        <div class="setting-group">
            <span class="label">VISUAL_SPECTRUM_UI</span>
            <select id="colorTheme" onchange="updateThemePreview(this.value)">
                <option value="#ff5722">ARES ORANGE [DEFAULT]</option>
                <option value="#00d4ff">ICE BLUE [POLAR]</option>
                <option value="#4caf50">OXYGEN GREEN [BIO]</option>
                <option value="#e91e63">PULSE RED [CRITICAL]</option>
            </select>
        </div>

        <div class="setting-group">
            <span class="label">AUDIO_FEEDBACK_GAIN</span>
            <input type="range" id="volume" min="0" max="100" value="70" oninput="adjustVolume(this.value)">
        </div>

        <div class="setting-group">
            <span class="label">INTERFACE_LANGUAGE</span>
            <select id="lang">
                <option value="UA">UKRAINIAN_UNIT_01</option>
                <option value="EN">ENGLISH_UNIT_02</option>
            </select>
        </div>

        <div id="log">SYSTEM STATUS: WAITING FOR USER INPUT...</div>

        <div class="button-zone">
            <button class="btn-save" onclick="saveAndExit()">[ APPLY_CHANGES ]</button>
            <button onclick="window.location.href='index.html'">[ ABORT_&_EXIT ]</button>
        </div>

        <div class="decoration">TERMINAL_ID: MARS-CONF-882</div>
    </div>

    <script>
        const bgMusic = new Audio('fon_menu.mp3');
        bgMusic.loop = true;

        function playClickSound() {
            const clickSnd = new Audio('click-effect.mp3');
            clickSnd.volume = (localStorage.getItem('marsVol') || 70) / 100;
            clickSnd.play().catch(()=>{});
        }

        function adjustVolume(val) {
            bgMusic.volume = (val / 100) * 0.5;
            document.getElementById('log').innerText = `AUDIO_GAIN_SET_TO: ${val}dB`;
        }

        const bgColors = {
            "#ff5722": "#1a0800",
            "#00d4ff": "#000a1a",
            "#4caf50": "#051a05",
            "#e91e63": "#1a0008"
        };

        window.onload = function() {
            const theme = localStorage.getItem('marsTheme') || '#ff5722';
            const fx = localStorage.getItem('marsFX') !== 'false';
            const vol = localStorage.getItem('marsVol') || '70';
            
            document.getElementById('colorTheme').value = theme;
            document.getElementById('checkFX').checked = fx;
            document.getElementById('volume').value = vol;

            updateThemePreview(theme);
            toggleFX();
            
            document.querySelectorAll('button, select, input').forEach(el => {
                el.addEventListener('click', playClickSound);
            });
        };

        function updateThemePreview(color) {
            document.documentElement.style.setProperty('--accent-color', color);
            const darkBg = bgColors[color] || "#000";
            document.getElementById('bg').style.backgroundColor = darkBg;
            const r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
            document.documentElement.style.setProperty('--glow', `rgba(${r},${g},${b}, 0.3)`);
        }

        function toggleFX() {
            const isChecked = document.getElementById('checkFX').checked;
            document.getElementById('fx').style.display = isChecked ? 'block' : 'none';
        }

        function saveAndExit() {
            localStorage.setItem('marsTheme', document.getElementById('colorTheme').value);
            localStorage.setItem('marsFX', document.getElementById('checkFX').checked);
            localStorage.setItem('marsVol', document.getElementById('volume').value);
            localStorage.setItem('marsLang', document.getElementById('lang').value);

            document.getElementById('log').innerText = "UPDATING_CORE_REGISTRY...";
            setTimeout(() => { window.location.href = 'index.html'; }, 800);
        }

        document.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.volume = (localStorage.getItem('marsVol') || 70) / 200;
                bgMusic.play().catch(() => {});
            }
        }, { once: true });
    </script>
</body>
</html>
