<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>PHOBOS Protocol - Advanced Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d4ff; 
            --glow: rgba(0, 212, 255, 0.25);
            --correct: #58cc02;
            --wrong: #ff4b4b;
            --bg: #000810;
        }

        /* Прибираємо смуги прокрутки */
        * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 0.4s ease;
        }

        /* Динамічні фони */
        body.global-correct { background: radial-gradient(circle, rgba(0, 50, 0, 0.4) 0%, #000 100%); }
        body.global-wrong { background: radial-gradient(circle, #300 0%, #000 100%); animation: alarmFlash 0.6s infinite; }

        @keyframes alarmFlash { 50% { opacity: 0.7; } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }

        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .quiz-container {
            width: 90%;
            max-width: 850px;
            max-height: 95vh;
            background: rgba(0, 5, 15, 0.95);
            border: 2px solid var(--accent);
            box-shadow: 0 0 40px var(--glow), inset 0 0 20px var(--glow);
            backdrop-filter: blur(15px);
            padding: clamp(20px, 5vh, 45px);
            position: relative;
            border-radius: 15px;
            transition: all 0.4s;
            display: flex;
            flex-direction: column;
        }

        body.global-correct .quiz-container { border-color: var(--correct); box-shadow: 0 0 40px rgba(88,204,2,0.3); }
        body.global-wrong .quiz-container { border-color: var(--wrong); box-shadow: 0 0 40px rgba(255,75,75,0.3); }

        .corner { position: absolute; width: 25px; height: 25px; border: 2px solid var(--accent); transition: 0.4s; }
        .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        .header {
            font-family: 'Orbitron';
            color: var(--accent);
            letter-spacing: 3px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--glow);
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            font-size: clamp(0.7rem, 2vw, 1rem);
        }

        .question-text {
            font-size: clamp(1.2rem, 3vh, 1.8rem);
            font-family: 'Orbitron';
            margin-bottom: 30px;
            min-height: 80px;
            color: #e0faff;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--accent);
            border-bottom: 5px solid var(--accent);
            color: white;
            padding: 20px;
            font-family: 'Share Tech Mono';
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.1s;
            border-radius: 12px;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) { background: var(--glow); transform: translateY(-2px); }
        .option-btn:active:not(:disabled) { transform: translateY(2px); border-bottom-width: 2px; }

        .option-btn.correct { background: #d7ffb8 !important; color: #58cc02; border-color: #58cc02; border-bottom-color: #46a302; }
        .option-btn.wrong { background: #ffdfe0 !important; color: #ff4b4b; border-color: #ff4b4b; border-bottom-color: #d13d3d; }

        .fact-panel {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-left: 4px solid var(--accent);
            display: none;
            font-size: 1.1rem;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .next-btn {
            margin-top: 25px; width: 100%; background: var(--accent);
            border: none; border-bottom: 4px solid rgba(0,0,0,0.2);
            color: black; padding: 18px; font-family: 'Orbitron'; 
            font-size: 1.1rem; font-weight: bold;
            cursor: pointer; display: none; border-radius: 12px;
            text-transform: uppercase;
        }
        body.global-correct .next-btn { background: var(--correct); }
        body.global-wrong .next-btn { background: var(--wrong); }

        #progress-fill {
            position: absolute; bottom: 0; left: 0; height: 6px;
            background: var(--accent); transition: width 0.5s; 
            width: 0%; border-radius: 0 0 0 15px;
        }

        #music-ui {
            position: fixed; top: 20px; right: 20px;
            cursor: pointer; font-size: 1.5rem; z-index: 100;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="music-ui">🔊</div>
    <div class="grid-bg"></div>

    <div class="quiz-container" id="main-card">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <div class="header">
            <span>ARES-CORE // PHOBOS_SYNC</span>
            <span id="counter">КРОК: 1 / 4</span>
        </div>

        <div id="quiz-box">
            <div class="question-text" id="question">Завантаження протоколу...</div>
            <div class="options-grid" id="options-container"></div>
            
            <div class="fact-panel" id="fact-box">
                <span style="font-weight:bold; color:var(--accent)">[ DATA ANALYSIS ]:</span>
                <p id="fact-text"></p>
            </div>

            <button class="next-btn" id="next-button" onclick="handleNext()">Наступний сектор</button>
        </div>

        <div id="progress-fill"></div>
    </div>

    <audio id="bg-music" loop src="test_voce.mp3"></audio>
    <audio id="fact-player"></audio>
    <audio id="sfx-correct" src="correct.mp3"></audio>
    <audio id="sfx-error" src="error.mp3"></audio>

    <script>
        let questions = [
            { 
                q: "Яке походження Фобоса найбільш імовірним?", 
                options: ["Уламок Землі", "Захоплений астероїд", "Частина Марса", "Згасла комета"], 
                correctAnswer: "Захоплений астероїд", 
                fact: "Фобос дуже схожий на астероїди C-типу. Вважається, що Марс захопив його своєю гравітацією з поясу астероїдів.",
                audio: "fact1.mp3" 
            },
            { 
                q: "Яка доля чекає на Фобос через 30-50 млн років?", 
                options: ["Вилетить у космос", "Розпадеться у кільце", "Зіткнеться з Деймосом", "Вибухне"], 
                correctAnswer: "Розпадеться у кільце", 
                fact: "Фобос поступово наближається до Марса. Сили тяжіння розірвуть його, створивши кільце навколо планети.",
                audio: "fact2.mp3" 
            },
            { 
                q: "Як називається найбільший ударний кратер на Фобосі?", 
                options: ["Олімп", "Стікні", "Кассіні", "Марінер"], 
                correctAnswer: "Стікні", 
                fact: "Кратер Стікні настільки великий (9 км), що удар, який його створив, ледь не розколов увесь супутник.",
                audio: "fact3.mp3" 
            },
            { 
                q: "За який час Фобос робить повний оберт навколо Марса?", 
                options: ["24 години", "30 днів", "7 годин 39 хвилин", "12 годин"], 
                correctAnswer: "7 годин 39 хвилин", 
                fact: "Фобос обертається швидше, ніж сам Марс навколо своєї осі, тому він сходить і заходить двічі на марсіанську добу.",
                audio: "fact4.mp3" 
            }
        ];

        let currentIdx = 0;
        const bgMusic = document.getElementById('bg-music');
        const factAudio = document.getElementById('fact-player');
        const sfxCorrect = document.getElementById('sfx-correct');
        const sfxError = document.getElementById('sfx-error');
        const mainCard = document.getElementById('main-card');

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function init() {
            shuffle(questions);
            const themeColor = localStorage.getItem('marsTheme') || '#00d4ff';
            document.documentElement.style.setProperty('--accent', themeColor);
            document.documentElement.style.setProperty('--glow', themeColor + '40');

            const userVol = (localStorage.getItem('marsVol') || 70) / 100;
            bgMusic.volume = userVol * 0.2;
            factAudio.volume = userVol;
            sfxCorrect.volume = userVol;
            sfxError.volume = userVol;

            showQuestion();
        }

        function showQuestion() {
            const data = questions[currentIdx];
            document.getElementById('question').innerText = data.q;
            document.getElementById('counter').innerText = `КРОК: ${currentIdx + 1} / ${questions.length}`;
            document.getElementById('progress-fill').style.width = ((currentIdx + 1) / questions.length * 100) + "%";
            
            const optionsBox = document.getElementById('options-container');
            optionsBox.innerHTML = '';
            
            shuffle([...data.options]).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `> ${opt}`;
                btn.onclick = () => checkChoice(opt, btn);
                optionsBox.appendChild(btn);
            });

            document.getElementById('next-button').style.display = 'none';
            document.getElementById('fact-box').style.display = 'none';
            document.body.classList.remove('global-correct', 'global-wrong');
            mainCard.classList.remove('shake');
        }

        function checkChoice(selectedText, btn) {
            const data = questions[currentIdx];
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            if (selectedText.includes(data.correctAnswer)) {
                btn.classList.add('correct');
                document.body.classList.add('global-correct');
                sfxCorrect.play().catch(()=>{});
            } else {
                btn.classList.add('wrong');
                document.body.classList.add('global-wrong');
                mainCard.classList.add('shake');
                sfxError.play().catch(()=>{});
                allBtns.forEach(b => {
                    if(b.innerText.includes(data.correctAnswer)) b.classList.add('correct');
                });
            }

            document.getElementById('fact-text').innerText = data.fact;
            document.getElementById('fact-box').style.display = 'block';
            
            factAudio.src = data.audio;
            setTimeout(() => {
                factAudio.play().catch(()=>{});
                document.getElementById('next-button').style.display = 'block';
            }, 400);
        }

        function handleNext() {
            factAudio.pause();
            factAudio.currentTime = 0;

            if (currentIdx < questions.length - 1) {
                currentIdx++;
                showQuestion();
            } else {
                localStorage.setItem('phobos_complete', 'true');
                document.getElementById('quiz-box').innerHTML = `
                    <h2 style="color:var(--accent); text-align:center; font-family:Orbitron; margin-top:20px;">PHOBOS SYNC SUCCESS</h2>
                    <p style="text-align:center; margin: 30px 0; font-size:1.2rem;">Протокол завершено. Дані про внутрішній супутник додано до бази.</p>
                    <button class="next-btn" style="display:block" onclick="window.location.href='game.html'">Return to Bridge</button>
                `;
                document.body.classList.add('global-correct');
            }
        }

        document.getElementById('music-ui').onclick = () => {
            if (bgMusic.paused) { bgMusic.play(); document.getElementById('music-ui').innerText = "🔊"; }
            else { bgMusic.pause(); document.getElementById('music-ui').innerText = "🔇"; }
        };

        document.addEventListener('click', () => { if (bgMusic.paused) bgMusic.play().catch(()=>{}); }, { once: true });
        window.onload = init;
    </script>
</body>
</html>
