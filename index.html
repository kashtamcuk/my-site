<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mars OS - Main Terminal v2.0</title>
    
    <!-- тут підключається стиль шрифта -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- підключення файла css -->
    <link rel="stylesheet" href="головне_меню_код/style.css">
</head>
<body>

    <!-- Візуальні ефекти фону, пил та лінії які бігають по екрану -->
    <div id="mars-bg"><div class="dust"></div></div>
    <div class="scanlines"></div>

    <main id="main-menu">
        <!-- Верхня панель, системна інформація та годинник -->
        <div class="hud-info top-left">Ares-III // System_Core_v4.2</div>
        <div id="live-clock" class="hud-info top-right">00:00:00</div>

        <!-- Декоративні кути -->
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <!-- Центральний логотип та назва сайту -->
        <div class="logo-section">
            <h1>MARS OS</h1>
            <p>Ares Settlement Initiative</p>
        </div>

        <!-- бокс з кнопками управління -->
        <nav class="nav-buttons">
            <button onclick="navigate('game.html')">ІНІЦІАЛІЗУВАТИ МІСІЮ</button>
            
            <!-- Секція Хабу з попередженням про доступ хаб відкриється лише коли пройти тест про марс -->
            <div class="hub-container">
                <div id="lock-warning">ДОСТУП ЗАБОРОНЕНО: СПЕРШУ ПРОЙДІТЬ ТЕСТУВАННЯ</div>
                <button id="hub-btn" onclick="tryEnterHub()">МУЛЬТИМЕДІЙНИЙ ХАБ</button>
            </div>

            <button onclick="navigate('settings.html')">КОНФІГУРАЦІЯ СИСТЕМИ</button>
            <button onclick="navigate('mars.html')">АРХІВ ДАНИХ</button>
            <button onclick="navigate('videos.html')">ВІЗУАЛЬНА РОЗВІДКА</button>
        </nav>

        <!-- Нижня панель щоб придати атмосферу бортового комп'ютера -->
        <div class="footer-status">
            <span>COORD: <span id="coords" class="telemetry">18.44°N 77.45°E</span></span>
            <span>TEMP: <span class="telemetry">-63°C</span></span>
            <span class="status-active">TERMINAL ACTIVE</span>
        </div>
    </main>

    <!-- підключення js файла для логіки головного меню -->
    <script src="головне_меню_код/script.js"></script>
</body>
</html>
