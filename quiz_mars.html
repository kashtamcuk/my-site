<!DOCTYPE html>
<html lang="uk">
<head>
    <!-- Базові налаштування, щоб коректно відображалась кирилиця та назва вкладки -->
    <meta charset="UTF-8">
    <title>MARS Protocol - Core Sync</title>
    
    <!-- Підтягую шрифти для космічного дизайну: Orbitron для заголовків, інші для тексту -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Мій файл стилів саме для Марса -->
    <link rel="stylesheet" href="подорж_між_сопутниками_на_марс/style_mars.css">
</head>
<body>

    <!-- Кнопка для вмикання музики та декоративна сітка на фоні -->
    <div id="music-ui">🔊</div>
    <div class="grid-bg"></div>

    <!-- Головна картка з питанням -->
    <div class="quiz-container" id="main-card">
        <!-- Декоративні кути рамки, щоб виглядало як інтерфейс корабля -->
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <!-- Верхня частина: назва системи та номер поточного питання -->
        <div class="header">
            <span>ARES-CORE // MARS_SYNC</span>
            <span id="counter">КРОК: 1 / 10</span>
        </div>

        <div id="quiz-box">
            <!-- Сюди скрипт буде вставляти саме питання -->
            <div class="question-text" id="question">Завантаження протоколу...</div>
            
            <!-- Тут будуть генеруватися кнопки з варіантами відповідей -->
            <div class="options-grid" id="options-container"></div>
            
            <!-- Блок з поясненням (фактом), який з'являється після вибору відповіді -->
            <div class="fact-panel" id="fact-box">
                <span style="font-weight:bold; color:var(--accent)">[ DATA ANALYSIS ]:</span>
                <p id="fact-text"></p>
            </div>

            <!-- Кнопка, щоб перейти до наступного питання -->
            <button class="next-btn" id="next-button" onclick="handleNext()">Наступний сектор</button>
        </div>

        <!-- Смужка прогресу в самому низу контейнера -->
        <div id="progress-fill"></div>
    </div>

    <!-- Всі звукові файли: ембієнт, озвучка фактів та ефекти помилки/успіху -->
    <audio id="bg-music" loop src="mars_ambient.mp3"></audio>
    <audio id="fact-player"></audio>
    <audio id="sfx-correct" src="загальна_озвучка/correct.mp3"></audio>
    <audio id="sfx-error" src="загальна_озвучка/error.mp3"></audio>

    <!-- Підключаю JS з логікою гри -->
    <script src="подорж_між_сопутниками_на_марс/code_mars.js"></script>
</body>
</html>
